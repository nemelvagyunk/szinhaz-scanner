const genres = {"A világ leggazdagabb asszonya": ["filmdráma"], "A kegyelem": ["dráma"], "A tenger útja": ["dráma"], "A titkosügynök": ["politikai thriller"], "Bugonia": ["vígjáték", "sci-fi"], "Csendes barát": ["játékfilm"], "Érzelmi érték": ["vígjáték", "filmdráma"], "Father Mother Sister Brother": [], "Filmrendezők klubja – Kostyál Márk: Kojot": ["filmdráma"], "Hamnet": ["filmdráma"], "Itt érzem magam otthon": ["dráma"], "Mambo Maternica": ["dráma"], "Marty Supreme": ["dráma", "sport"], "Nincs más választás": ["fekete komédia"], "Franz - Kafka élete": ["életrajzi dráma"], "Tabuk, döntések, női sorsok  – Mambo Maternica vetítés és beszélgetés": ["dráma"], "Arco - Fiú a jövőből": ["animációs film"], "Dalai Láma – A boldogság tanítása": ["dokumentumfilm"], "Egybenyíló szobák": ["filmdráma"], "Kurtág-töredékek": ["dokumentumfilm"], "Krusovszky Dénes: A másik mozaik könyvbemutató": [], "Brit Filmnapok 2026 - Rose of Nevada": ["dráma"], "Brit Filmnapok 2026 - A szerelem fáj": [], "Brit Filmnapok 2026 - Egy csepp méz 35mm": [], "A szeleburdi család": ["vígjáték"], "Brit Filmnapok 2026 - 100 Nights of Hero": [], "Brit Filmnapok 2026 - A Want in Her": ["dokumentumfilm"], "Brit Filmnapok 2026 - On Falling": [], "Brit Filmnapok 2026 - Everybody to Kenmure Street": ["dokumentumfilm"], "Brit Filmnapok 2026 - My Father's Shadow": [], "Hab a tortán! mesesorozat: Matricás Laci és a nagy zenebona": [], "Ha tudnék, beléd rúgnék": ["dráma thriller vígjáték"], "Üvöltő szelek": ["romantikus dráma"], "KultúrFlipper Filmklub: Csak egy anya": ["dráma"], "Prófécia": ["dokumentumfilm"], "80 dühös újságíró": ["dokumentumfilm"], "Reminders of Him - Emlékek róla": ["romantikus dráma"], "TAVASZI SZÉL – az ébredés": ["dokumentumfilm"], "A menyasszony!": ["horror", "filmdráma", "sci-fi"], "Beléd estem": ["romantikus filmvígjáték"], "Exit 8": ["horror"], "Sikoly 7.": ["horror"]};
const days = [{"date": "2026-03-16", "short": "H", "label": "H már.16."}, {"date": "2026-03-17", "short": "K", "label": "K már.17."}, {"date": "2026-03-18", "short": "Sze", "label": "Sze már.18."}, {"date": "2026-03-19", "short": "Cs", "label": "Cs már.19."}, {"date": "2026-03-20", "short": "P", "label": "P már.20."}, {"date": "2026-03-21", "short": "Szo", "label": "Szo már.21."}, {"date": "2026-03-22", "short": "V", "label": "V már.22."}];

let activeCinema = 'all';
let activeDay = 'all';

// Nap gombok
const dayFilters = document.getElementById('day-filters');
days.forEach(d => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn day-btn';
  btn.dataset.day = d.date;
  btn.textContent = d.label;
  dayFilters.appendChild(btn);
});

// Filter kattintások
function setupFilters(selector, varSetter) {
  document.querySelectorAll(selector).forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll(selector).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      varSetter(btn);
      render();
    });
  });
}
setupFilters('.cinema-btn', btn => activeCinema = btn.dataset.cinema);
setupFilters('.day-btn', btn => activeDay = btn.dataset.day);

function render() {
  const filtered = screenings.filter(s => {
    if (activeCinema !== 'all' && s.cinema !== activeCinema) return false;
    if (activeDay !== 'all' && s.date !== activeDay) return false;
    return true;
  });

  // Csoportosítás film szerint
  const films = {};
  filtered.forEach(s => {
    if (!films[s.film]) films[s.film] = { url: s.url, cinemas: {}, count: 0 };
    films[s.film].count++;
    if (!films[s.film].cinemas[s.cinema]) films[s.film].cinemas[s.cinema] = [];
    films[s.film].cinemas[s.cinema].push({ day: s.day_short, time: s.time, date: s.date });
  });

  const content = document.getElementById('content');

  // Rendezés: legtöbb vetítés elől
  const filmNames = Object.keys(films).sort((a, b) => films[b].count - films[a].count || a.localeCompare(b, 'hu'));

  if (filmNames.length === 0) {
    content.innerHTML = '<div class="empty"><div class="emoji">🎬</div>Nincs vetítés a szűrésnek megfelelően.</div>';
    document.getElementById('stats').textContent = '';
    return;
  }

  const cinemaOrder = ['Művész', 'Puskin', 'Toldi', 'Corvin'];
  const cinemaClass = { 'Művész': 'muvesz', 'Puskin': 'puskin', 'Toldi': 'toldi', 'Corvin': 'corvin' };

  let html = '';
  filmNames.forEach(film => {
    const info = films[film];
    let filmUrl = info.url || '';
    if (filmUrl && !filmUrl.startsWith('http')) filmUrl = 'https://artmozi.hu' + filmUrl;
    const filmGenres = genres[film] || [];

    html += '<div class="film-card"><div class="film-header"><div class="film-title">';
    if (filmUrl) html += '<a href="' + filmUrl + '" target="_blank">';
    html += film;
    if (filmUrl) html += ' ↗</a>';
    html += '</div>';
    html += '<span class="film-count">' + info.count + ' vetítés</span>';
    html += '</div>';

    if (filmGenres.length) {
      html += '<div class="film-genres">';
      filmGenres.forEach(g => { html += '<span class="genre-tag">' + g + '</span>'; });
      html += '</div>';
    }

    html += '<div class="film-screenings">';
    cinemaOrder.forEach(cinema => {
      if (!info.cinemas[cinema]) return;
      const times = info.cinemas[cinema];
      html += '<div class="cinema-row">';
      html += '<span class="cinema-name ' + cinemaClass[cinema] + '">' + cinema + '</span>';
      html += '<div>';
      times.forEach(t => {
        html += '<span class="day-label">' + t.day + '</span>';
        html += '<span class="time-chip">' + t.time + '</span> ';
      });
      html += '</div></div>';
    });

    html += '</div></div>';
  });

  content.innerHTML = html;
  document.getElementById('stats').textContent = filmNames.length + ' film · ' + filtered.length + ' vetítés';
}

render();
</script>
